version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: membership-postgres
    environment:
      POSTGRES_DB: membershipdb
      POSTGRES_USER: membership_user
      POSTGRES_PASSWORD: membership_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U membership_user -d membershipdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: membership-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@firstclub.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
