spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: false
  flyway:
    clean-disabled: true  # Never allow flyway:clean in production

# Restrict actuator exposure in prod — only /actuator/health for load-balancer checks
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never  # Don't leak system internals to unauthenticated callers

logging:
  level:
    root: WARN
    com.firstclub.membership: INFO

# Security — MUST be overridden in production via environment variables.
# The defaults in SecurityProperties are for local/demo use only.
security:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-this-secret-must-be-at-least-32-bytes-long-0123456789}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  seed:
    admin-username: ${SEED_ADMIN_USERNAME:admin}
    admin-password: ${SEED_ADMIN_PASSWORD:admin123}
    user-username: ${SEED_USER_USERNAME:demo}
    user-password: ${SEED_USER_PASSWORD:demo123}
