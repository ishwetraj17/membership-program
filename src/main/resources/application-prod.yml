spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    show-sql: false
  flyway:
    clean-disabled: true  # Never allow flyway:clean in production

# Restrict actuator exposure in prod — only /actuator/health for load-balancer checks
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never  # Don't leak system internals to unauthenticated callers

logging:
  level:
    root: WARN
    com.firstclub.membership: INFO
