# ─── Dev profile ──────────────────────────────────────────────────────────────
# Uses H2 in-memory DB; Flyway disabled (JPA creates schema via ddl-auto)

# Database
spring.datasource.url=jdbc:h2:mem:membershipdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway — off in dev (schema managed by hibernate ddl-auto)
spring.flyway.enabled=false

# JWT — dev-only secret (Base64-encoded, 256-bit key). Override via env var in prod.
app.jwt.secret=Y2hhbmdlbWVpbnByb2R1Y3Rpb24tdGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXkh

# Logging
logging.level.com.firstclub.membership=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
