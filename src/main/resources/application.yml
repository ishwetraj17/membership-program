spring:
  application:
    name: FirstClub Membership Program

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:membershipdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC   # persist/read timestamps as UTC regardless of server zone

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      # recordStats enables Caffeine hit/miss statistics so Spring Boot binds cache.* metrics
      # (cache.gets{result=hit|miss}, cache.puts, cache.evictions) per named cache.
      spec: maximumSize=200,expireAfterWrite=10m,recordStats

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful   # stop accepting new requests, let in-flight ones finish

spring.lifecycle.timeout-per-shutdown-phase: 30s

# Comma-separated allowed CORS origins (browser clients). Default: none cross-origin.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        # 'prometheus' exposes /actuator/prometheus for scraping. It is restricted to ADMIN in
        # SecurityConfig (only /actuator/health is public), so listing it here is safe.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # exposes /actuator/health/liveness and /readiness
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      # Stamp every meter with the application name so a multi-node Prometheus/Grafana setup
      # can group and filter series by service.
      application: ${spring.application.name}
  health:
    # Redis is an optional cache backend (enabled only under the 'redis' profile),
    # so its health probe is off by default to avoid a DOWN status without Redis.
    redis:
      enabled: false

# Per-client API rate limiting. The in-process default (Bucket4j) is used by LocalRateLimiter;
# under the 'redis' profile RedisRateLimiter shares the same capacity across all pods. These two
# values drive both strategies, so the limit is identical regardless of where the counter lives.
rate-limit:
  capacity: 100
  refill-period-seconds: 60

# Transactional-outbox relay poll interval.
outbox:
  relay:
    delay-ms: 10000
  retention-days: 30

# Entitlements cache — the checkout read path. Short TTL since event-driven invalidation keeps it
# fresh; the TTL is just the backstop. Applied to the Redis cache (prod); Caffeine (dev) uses the
# global cache spec.
entitlements:
  cache:
    ttl-seconds: 300

# Payment architecture (PSP-agnostic). No provider is bound here — these settings configure the
# resilience and timeout policy a future PSP adapter inherits.
payment:
  # Outbound HTTP timeouts for the PSP adapter (consumed by PaymentClientFactory). Never let a slow
  # provider pin a request thread.
  client:
    connect-timeout: 2s
    read-timeout: 5s
    write-timeout: 5s
  # Circuit breaker + retry around charge/refund/recurring billing (Resilience4j).
  resilience:
    circuit-breaker:
      failure-rate-threshold: 50      # open at 50% failures over the window
      sliding-window-size: 20
      minimum-number-of-calls: 10
      wait-duration-in-open-state: 30s
      permitted-calls-in-half-open-state: 5
      slow-call-duration-threshold: 8s
      slow-call-rate-threshold: 100
    retry:
      max-attempts: 3                 # 1 try + 2 retries, transient failures only
      wait-duration: 200ms
      backoff-multiplier: 2.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  packages-to-scan: com.firstclub.membership.controller
  show-actuator: false

# ─────────────────────────────────────────────────────────────
# Externalized membership configuration
# Change prices, discounts and tier behaviour here — no code change required.
# ─────────────────────────────────────────────────────────────
membership:
  tiers:
    silver:
      level: 1
      description: "Essential benefits for new members"
      base-price: 299
      discount-percentage: 5.00
      free-delivery: false
      exclusive-deals: false
      early-access: false
      priority-support: false
      max-coupons-per-month: 2
      delivery-days: 5
      additional-benefits: "Basic member perks and content access"
    gold:
      level: 2
      description: "Premium benefits with free delivery"
      base-price: 499
      discount-percentage: 10.00
      free-delivery: true
      exclusive-deals: true
      early-access: true
      priority-support: false
      max-coupons-per-month: 5
      delivery-days: 3
      additional-benefits: "Free delivery, exclusive deals, early sale access"
    platinum:
      level: 3
      description: "Ultimate tier with all premium features"
      base-price: 799
      discount-percentage: 15.00
      free-delivery: true
      exclusive-deals: true
      early-access: true
      priority-support: true
      max-coupons-per-month: 10
      delivery-days: 1
      additional-benefits: "All benefits plus priority support and same-day delivery"
  plan-discounts:
    quarterly-multiplier: 0.95
    yearly-multiplier: 0.85
