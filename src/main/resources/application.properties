# Application Configuration
server.port=8080
spring.application.name=FirstClub Membership Program
app.version=1.0.0

# Active profile (override with -Dspring.profiles.active=prod)
spring.profiles.active=dev

# Disable data.sql to avoid conflicts
spring.sql.init.mode=never

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=com.firstclub.membership.controller
springdoc.show-actuator=false

# JSON formatting
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Membership tier base prices (INR) - configurable without code changes
membership.pricing.silver=299
membership.pricing.gold=499
membership.pricing.platinum=799

# Scheduled jobs - cron expressions
membership.scheduler.expire-subscriptions=0 0 1 * * *
membership.scheduler.process-renewals=0 5 1 * * *

# Caffeine cache - plans and tiers rarely change, cache for 10 minutes
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s
spring.cache.cache-names=plans,plansByTier,plansByType,tiers

# JWT configuration — secret is profile-specific (see application-dev.properties / application-prod.properties)
# The secret must be Base64-encoded and at least 256 bits (32 bytes) for HS256.
# DO NOT put the secret in this base file — use profile-specific properties or env vars.
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS — override in prod profile
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080